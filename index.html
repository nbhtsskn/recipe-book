<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Book</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <h1>🍳 My Recipe Book</h1>
    <p>動画から集めたレシピコレクション</p>
    <div class="search-bar">
      <input type="text" id="search" placeholder="レシピを検索... / Search recipes...">
    </div>
  </header>
  <main class="main-content">
    <p class="section-title">レシピ一覧 <span id="recipe-count"></span></p>
    <div class="recipe-grid" id="recipe-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="icon">📭</div>
      <p>レシピが見つかりません</p>
    </div>
  </main>
  <script>
    const allRecipes = [
  {
    "id": "xGKn7TD9jaM",
    "title": "世界で一番旨い唐揚げ【至高の唐揚げ】",
    "channel": "料理研究家リュウジのバズレシピ",
    "thumbnail": "https://i.ytimg.com/vi/xGKn7TD9jaM/maxresdefault.jpg",
    "duration": "10:15",
    "added_at": "2026-04-06",
    "tags": [
      "唐揚げ",
      "から揚げ",
      "至高シリーズ",
      "リュウジ",
      "バズレシピ",
      "鶏肉",
      "揚げ物"
    ],
    "url": "https://www.youtube.com/watch?v=xGKn7TD9jaM"
  },
  {
    "id": "BcKNwo7bzJ4",
    "title": "市販のルーで作る【至高のカレー】",
    "channel": "料理研究家リュウジのバズレシピ",
    "thumbnail": "https://i.ytimg.com/vi/BcKNwo7bzJ4/sddefault.jpg",
    "duration": "15:11",
    "added_at": "2026-04-06",
    "tags": [
      "カレー",
      "至高シリーズ",
      "リュウジ",
      "バズレシピ",
      "市販ルー",
      "時短",
      "豚肉",
      "玉ねぎ"
    ],
    "url": "https://www.youtube.com/watch?v=BcKNwo7bzJ4"
  },
  {
    "id": "EmCPHumbMvo",
    "title": "料理研究家が本気で作る「至高の炒飯」",
    "channel": "料理研究家リュウジのバズレシピ",
    "thumbnail": "https://i.ytimg.com/vi/EmCPHumbMvo/maxresdefault.jpg",
    "duration": "13:30",
    "added_at": "2026-04-06",
    "tags": [
      "炒飯",
      "チャーハン",
      "中華",
      "リュウジ",
      "バズレシピ",
      "至高シリーズ"
    ],
    "url": "https://www.youtube.com/watch?v=EmCPHumbMvo"
  }
];
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
    function renderGrid(recipes){
      const grid=document.getElementById("recipe-grid"),empty=document.getElementById("empty-state");
      document.getElementById("recipe-count").textContent="("+allRecipes.length+")";
      if(!recipes.length){grid.innerHTML="";empty.style.display="block";return;}
      empty.style.display="none";
      grid.innerHTML=recipes.map(function(r){
        var th=r.thumbnail?"<img src=\""+r.thumbnail+"\" alt=\""+esc(r.title)+"\" loading=\"lazy\" onerror=\"this.style.display='none'\">":"";
        var dur=r.duration?"<span>⏱ "+r.duration+"</span>":"";
        var tags=(r.tags||[]).slice(0,4).map(function(t){return"<span class='tag'>"+esc(t)+"</span>";}).join("");
        return"<a class='recipe-card' href='recipes/"+r.id+".html'>"+th
          +"<div class='card-body'><div class='card-title'>"+esc(r.title)+"</div>"
          +"<div class='card-meta'><span>📺 "+esc(r.channel||"")+"</span>"+dur+"<span>📅 "+(r.added_at||"")+"</span></div>"
          +"<div class='card-tags'>"+tags+"</div></div></a>";
      }).join("");
    }
    document.getElementById("search").addEventListener("input",function(e){
      var q=e.target.value.toLowerCase();
      renderGrid(allRecipes.filter(function(r){
        return r.title.toLowerCase().includes(q)||(r.channel||"").toLowerCase().includes(q)||(r.tags||[]).some(function(t){return t.toLowerCase().includes(q);});
      }));
    });
    renderGrid(allRecipes);
  </script>
</body>
</html>
