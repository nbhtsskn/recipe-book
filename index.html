    var currentSort = "added_at";
    var currentQuery = "";
    var currentIngredientQuery = "";
    var selectedChannels = new Set();

    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

    function fmtNum(n){
      if(n==null) return "";
      n=parseInt(n);
      if(n>=100000000) return (n/100000000).toFixed(1)+"億";
      if(n>=10000) return Math.floor(n/10000)+"万";
      return n.toLocaleString();
    }

    function sortRecipes(recipes, key){
      return recipes.slice().sort(function(a,b){
        if(key==="channel") return (a.channel||"").localeCompare(b.channel||"","ja");
        var av=a[key]||0, bv=b[key]||0;
        if(key==="added_at"||key==="upload_date") return (bv>av?1:bv<av?-1:0);
        return bv-av;
      });
    }

    function buildChannelFilter(){
      var channels=[...new Set(allRecipes.map(function(r){return r.channel||"";}))].filter(Boolean).sort(function(a,b){return a.localeCompare(b,"ja");});
      channels.forEach(function(ch){selectedChannels.add(ch);});
      var popout=document.getElementById("filter-popout");
      var btn=document.getElementById("filter-btn");
      var allCount=channels.length;
      function updateFilterBtn(){
        var n=selectedChannels.size;
        btn.textContent=n===allCount?"チャンネル ▼":"チャンネル ("+n+"/"+allCount+") ▼";
        btn.classList.toggle("filtered",n!==allCount);
      }
      channels.forEach(function(ch){
        var lbl=document.createElement("label");
        lbl.className="channel-cb checked";
        var cb=document.createElement("input");
        cb.type="checkbox"; cb.checked=true; cb.value=ch;
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(ch));
        lbl.addEventListener("click",function(e){
          e.preventDefault();
          if(selectedChannels.has(ch)){selectedChannels.delete(ch);lbl.classList.remove("checked");cb.checked=false;}
          else{selectedChannels.add(ch);lbl.classList.add("checked");cb.checked=true;}
          updateFilterBtn();
          renderGrid(getFiltered());
        });
        popout.appendChild(lbl);
      });
      btn.addEventListener("click",function(e){
        e.stopPropagation();
        popout.classList.toggle("open");
      });
      document.addEventListener("click",function(e){
        if(!popout.contains(e.target)&&e.target!==btn) popout.classList.remove("open");
      });
      document.getElementById("filter-all").addEventListener("click",function(){
        channels.forEach(function(ch){
          selectedChannels.add(ch);
          popout.querySelectorAll(".channel-cb").forEach(function(l){
            if(l.querySelector("input").value===ch){l.classList.add("checked");l.querySelector("input").checked=true;}
          });
        });
        updateFilterBtn(); renderGrid(getFiltered());
      });
      document.getElementById("filter-none").addEventListener("click",function(){
        channels.forEach(function(ch){
          selectedChannels.delete(ch);
          popout.querySelectorAll(".channel-cb").forEach(function(l){
            if(l.querySelector("input").value===ch){l.classList.remove("checked");l.querySelector("input").checked=false;}
          });
        });
        updateFilterBtn(); renderGrid(getFiltered());
      });
    }

    function getFiltered(){
      var q=currentQuery;
      var iq=currentIngredientQuery;
      var list=allRecipes.filter(function(r){
        if(!selectedChannels.has(r.channel||"")) return false;
        if(q&&!r.title.toLowerCase().includes(q)&&!(r.channel||"").toLowerCase().includes(q)&&!(r.tags||[]).some(function(t){return t.toLowerCase().includes(q);})) return false;
        if(iq&&!(r.ingredient_names||[]).some(function(n){return n.toLowerCase().includes(iq);})) return false;
        return true;
      });
      return sortRecipes(list, currentSort);
    }

    function renderGrid(recipes){
      var grid=document.getElementById("recipe-grid"),empty=document.getElementById("empty-state");
      document.getElementById("recipe-count").textContent="("+recipes.length+")";
      if(!recipes.length){grid.innerHTML="";empty.style.display="block";return;}
      empty.style.display="none";
      grid.innerHTML=recipes.map(function(r){
        var th=r.thumbnail?"<img src=\""+r.thumbnail+"\" alt=\""+esc(r.title)+"\" loading=\"lazy\" onerror=\"this.style.display='none'\">":"";
        var meta="<span>📺 "+esc(r.channel||"")+"</span>";
        if(r.duration) meta+="<span>⏱ "+r.duration+"</span>";
        if(r.view_count) meta+="<span>▶ "+fmtNum(r.view_count)+"回</span>";
        if(r.like_count) meta+="<span>👍 "+fmtNum(r.like_count)+"</span>";
        meta+="<span>📅 "+(r.added_at||"")+"</span>";
        var tags=(r.tags||[]).slice(0,4).map(function(t){return"<span class='tag'>"+esc(t)+"</span>";}).join("");
        return"<a class='recipe-card' href='recipes/"+r.id+".html'>"+th
          +"<div class='card-body'><div class='card-title'>"+esc(r.title)+"</div>"
          +"<div class='card-meta'>"+meta+"</div>"
          +"<div class='card-tags'>"+tags+"</div></div></a>";
      }).join("");
    }

    document.getElementById("search").addEventListener("input",function(e){
      currentQuery=e.target.value.toLowerCase();
      renderGrid(getFiltered());
    });
    document.getElementById("search-ingredient").addEventListener("input",function(e){
      currentIngredientQuery=e.target.value.toLowerCase();
      renderGrid(getFiltered());
    });

    document.querySelectorAll(".sort-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        document.querySelectorAll(".sort-btn").forEach(function(b){b.classList.remove("active");});
        btn.classList.add("active");
        currentSort=btn.dataset.sort;
        renderGrid(getFiltered());
      });
    });

    document.getElementById("random-btn").addEventListener("click",function(){
      var list=getFiltered();
      if(!list.length) return;
      var r=list[Math.floor(Math.random()*list.length)];
      window.location.href="recipes/"+r.id+".html";
    });

    buildChannelFilter();
    renderGrid(getFiltered());
  </script>
</body>
</html>
