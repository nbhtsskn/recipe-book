  <title>My Recipe Book</title>
  <link rel="stylesheet" href="assets/style.css">

<body>
  <header class="site-header">
    <h1>🍳 My Recipe Book</h1>
    <p>動画から集めたレシピコレクション</p>
    <div class="search-bar">
      <input type="text" id="search" placeholder="レシピを検索... / Search recipes...">
    </div>
  </header>
  <main class="main-content">
    <div class="sort-bar">
      <span class="sort-label">並び替え：</span>
      <button class="sort-btn active" data-sort="added_at">追加日</button>
      <button class="sort-btn" data-sort="view_count">再生回数</button>
      <button class="sort-btn" data-sort="like_count">いいね数</button>
      <button class="sort-btn" data-sort="upload_date">投稿日</button>
      <button class="sort-btn" data-sort="channel">チャンネル</button>
      <button class="sort-btn" data-sort="duration_seconds">動画時間</button>
    </div>
    <p class="section-title">レシピ一覧 <span id="recipe-count"></span></p>
    <div class="recipe-grid" id="recipe-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="icon">📭</div>
      <p>レシピが見つかりません</p>
    </div>
  </main>

    var currentSort = "added_at";
    var currentQuery = "";

    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

    function fmtNum(n){
      if(n==null) return "";
      n=parseInt(n);
      if(n>=100000000) return (n/100000000).toFixed(1)+"億";
      if(n>=10000) return Math.floor(n/10000)+"万";
      return n.toLocaleString();
    }

    function sortRecipes(recipes, key){
      return recipes.slice().sort(function(a,b){
        if(key==="channel") return (a.channel||"").localeCompare(b.channel||"","ja");
        var av=a[key]||0, bv=b[key]||0;
        if(key==="added_at"||key==="upload_date") return (bv>av?1:bv<av?-1:0);
        return bv-av;
      });
    }

    function getFiltered(){
      var q=currentQuery;
      var list=q?allRecipes.filter(function(r){
        return r.title.toLowerCase().includes(q)||(r.channel||"").toLowerCase().includes(q)||(r.tags||[]).some(function(t){return t.toLowerCase().includes(q);});
      }):allRecipes;
      return sortRecipes(list, currentSort);
    }

    function renderGrid(recipes){
      var grid=document.getElementById("recipe-grid"),empty=document.getElementById("empty-state");
      document.getElementById("recipe-count").textContent="("+allRecipes.length+")";
      if(!recipes.length){grid.innerHTML="";empty.style.display="block";return;}
      empty.style.display="none";
      grid.innerHTML=recipes.map(function(r){
        var th=r.thumbnail?"<img src=\""+r.thumbnail+"\" alt=\""+esc(r.title)+"\" loading=\"lazy\" onerror=\"this.style.display='none'\">":"";
        var meta="<span>📺 "+esc(r.channel||"")+"</span>";
        if(r.duration) meta+="<span>⏱ "+r.duration+"</span>";
        if(r.view_count) meta+="<span>▶ "+fmtNum(r.view_count)+"回</span>";
        if(r.like_count) meta+="<span>👍 "+fmtNum(r.like_count)+"</span>";
        meta+="<span>📅 "+(r.added_at||"")+"</span>";
        var tags=(r.tags||[]).slice(0,4).map(function(t){return"<span class='tag'>"+esc(t)+"</span>";}).join("");
        return"<a class='recipe-card' href='recipes/"+r.id+".html'>"+th
          +"<div class='card-body'><div class='card-title'>"+esc(r.title)+"</div>"
          +"<div class='card-meta'>"+meta+"</div>"
          +"<div class='card-tags'>"+tags+"</div></div></a>";
      }).join("");
    }

    document.getElementById("search").addEventListener("input",function(e){
      currentQuery=e.target.value.toLowerCase();
      renderGrid(getFiltered());
    });

    document.querySelectorAll(".sort-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        document.querySelectorAll(".sort-btn").forEach(function(b){b.classList.remove("active");});
        btn.classList.add("active");
        currentSort=btn.dataset.sort;
        renderGrid(getFiltered());
      });
    });

    renderGrid(getFiltered());
  </script>
</body>
</html>
